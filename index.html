    <title>ThesisAI - Academic Writing Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      // Polyfill for process.env
      window.process = {
        env: {
          NODE_ENV: 'development',
          // Assuming API_KEY is injected by the environment or replaced during build.
          // If running locally without build replacement, manual entry might be needed here or via .env
        }
      };

      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Playfair Display', 'serif'],
            },
          }
        },
        plugins: [
          function({ addUtilities }) {
            const newUtilities = {
              '.no-scrollbar::-webkit-scrollbar': {
                display: 'none',
              },
              '.no-scrollbar': {
                '-ms-overflow-style': 'none',
                'scrollbar-width': 'none',
              },
              '.custom-scrollbar::-webkit-scrollbar': {
                width: '6px',
                height: '6px',
              },
              '.custom-scrollbar::-webkit-scrollbar-track': {
                backgroundColor: 'transparent',
              },
              '.custom-scrollbar::-webkit-scrollbar-thumb': {
                backgroundColor: '#cbd5e1',
                borderRadius: '9999px',
              },
              '.custom-scrollbar::-webkit-scrollbar-thumb:hover': {
                backgroundColor: '#94a3b8',
              }
            }
            addUtilities(newUtilities)
          }
        ]
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #f8fafc;
      }
      h1, h2, h3, h4, h5, h6 {
        font-family: 'Playfair Display', serif;
      }
      .academic-paper {
        font-family: 'Times New Roman', Times, serif;
        line-height: 1.5; /* Standard 1.5 spacing */
        font-size: 12pt;
      }
      /* Animation Utilities */
      @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
      .animate-fade-in { animation: fade-in 0.3s ease-out forwards; }
      
      @keyframes fade-in-up { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      .animate-fade-in-up { animation: fade-in-up 0.5s ease-out forwards; }
      
      @keyframes scale-in { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
      .animate-scale-in { animation: scale-in 0.2s ease-out forwards; }

      @keyframes fade-in-down { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
      .animate-fade-in-down { animation: fade-in-down 0.2s ease-out forwards; }

      /* Tiptap Table Styles */
      .ProseMirror table {
        border-collapse: collapse;
        table-layout: fixed;
        width: 100%;
        margin: 0;
        overflow: hidden;
      }
      .ProseMirror td,
      .ProseMirror th {
        min-width: 1em;
        border: 2px solid #ced4da;
        padding: 3px 5px;
        vertical-align: top;
        box-sizing: border-box;
        position: relative;
      }
      .ProseMirror th {
        font-weight: bold;
        text-align: left;
        background-color: #f1f3f5;
      }
      .ProseMirror .selectedCell:after {
        z-index: 2;
        position: absolute;
        content: "";
        left: 0; right: 0; top: 0; bottom: 0;
        background: rgba(200, 200, 255, 0.4);
        pointer-events: none;
      }
      .ProseMirror .column-resize-handle {
        position: absolute;
        right: -2px;
        top: 0;
        bottom: -2px;
        width: 4px;
        background-color: #adf;
        pointer-events: none;
      }
    </style>
